<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department of Paranoia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple SVG Icon Components to replace Lucide-React for single-file use
        const EyeOff = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>;
        const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const Unlock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;
        const ShieldAlert = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const KeyRound = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>;
        const Terminal = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>;

        const PARANOIA_QUESTIONS = [
          {
            id: 1,
            text: "According to the newly unearthed 'Dumbledore's Left Sock' manuscript, what is the actual reason the Hogwarts Express always departs at exactly 11:00 AM?",
            options: [
              "It syncs with the mating call of the Scottish Highland Snidget.",
              "11 represents the exact number of times Merlin failed his Apparition test.",
              "The train runs on the crushed dreams of squibs, which peak at 11 AM.",
              "It aligns with the Ley Lines of the Great London Pigeon Migration."
            ],
            correct: "The train runs on the crushed dreams of squibs, which peak at 11 AM."
          },
          {
            id: 2,
            text: "What is the true, highly classified purpose of the Leaky Cauldron's notoriously terrible pea soup?",
            options: [
              "It acts as a slow-release memory charm to make Muggles forget London.",
              "It's brewed using the tears of Gringotts goblins to test for counterfeit galleons.",
              "It contains traces of pulverized Time-Turners to keep the pub temporally anchored.",
              "Cornelius Fudge secretly used it to fund his campaign via the 'Pea Tax'."
            ],
            correct: "It contains traces of pulverized Time-Turners to keep the pub temporally anchored."
          },
          {
            id: 3,
            text: "In the unreleased 8th floor blueprints, what actually powers the Room of Requirement's transforming ability?",
            options: [
              "A captured boggart trapped in a continuous state of confusion.",
              "The lingering essence of Helga Hufflepuff's misplaced teapot.",
              "A sentient colony of magical termites that rearrange wooden atoms.",
              "Peeves the Poltergeist's physical umbilical cord."
            ],
            correct: "A captured boggart trapped in a continuous state of confusion."
          },
          {
            id: 4,
            text: "Why does the Sorting Hat *really* have a tear near its brim?",
            options: [
              "It was cut by Gryffindor's sword during a drunken duel with Slytherin.",
              "It acts as a ventilation shaft for the concentrated angst of 11-year-olds.",
              "It's not a tear; it's a mouth that secretly consumes one student a century.",
              "A moth with a craving for 1000-year-old enchanted leather ate it in 1842."
            ],
            correct: "It's not a tear; it's a mouth that secretly consumes one student a century."
          },
          {
            id: 5,
            text: "What is the actual reason Voldemort lost his nose?",
            options: [
              "Dark magic deterioration, as stated in the books.",
              "He sneezed while performing a dark ritual using violently allergic floo powder.",
              "Nagini accidentally bit it off while they were practicing Parseltongue.",
              "He sacrificed it to a swamp hag in Albania in exchange for Wi-Fi."
            ],
            correct: "He sneezed while performing a dark ritual using violently allergic floo powder."
          }
        ];

        const STORAGE_KEY = 'hp_paranoid_lockout_state';

        function App() {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          
          const [selectedAnswer, setSelectedAnswer] = useState('');
          const [isSuccess, setIsSuccess] = useState(false);
          const [loggedIn, setLoggedIn] = useState(false);
          const [timeLeft, setTimeLeft] = useState(null);

          const [sysState, setSysState] = useState({
            lockoutUntil: null,
            penaltyMultiplier: 1,
            hasAttemptedOnce: false,
            questionIndex: 0
          });

          useEffect(() => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
              setSysState(JSON.parse(saved));
            }
          }, []);

          useEffect(() => {
            if (!sysState.lockoutUntil) return;

            const interval = setInterval(() => {
              const now = Date.now();
              const difference = sysState.lockoutUntil - now;

              if (difference <= 0) {
                clearInterval(interval);
                setTimeLeft(null);
                const newState = { ...sysState, lockoutUntil: null };
                setSysState(newState);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(newState));
              } else {
                const h = Math.floor(difference / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);
                setTimeLeft(`${h}h ${m}m ${s}s`);
              }
            }, 1000);

            return () => clearInterval(interval);
          }, [sysState.lockoutUntil]);

          const handleVerify = (e) => {
            e.preventDefault();
            if (!selectedAnswer) return;

            const currentQuestion = PARANOIA_QUESTIONS[sysState.questionIndex % PARANOIA_QUESTIONS.length];
            
            let isCorrect = selectedAnswer === currentQuestion.correct;
            if (!sysState.hasAttemptedOnce) {
              isCorrect = false; 
            }

            if (isCorrect) {
              setIsSuccess(true);
            } else {
              const basePenaltyMs = 24 * 60 * 60 * 1000; 
              
              const penaltyDuration = basePenaltyMs * sysState.penaltyMultiplier;
              const lockoutEnd = Date.now() + penaltyDuration;

              const newState = {
                lockoutUntil: lockoutEnd,
                penaltyMultiplier: sysState.penaltyMultiplier + 1, 
                hasAttemptedOnce: true, 
                questionIndex: sysState.questionIndex + 1 
              };

              setSysState(newState);
              localStorage.setItem(STORAGE_KEY, JSON.stringify(newState));
              setSelectedAnswer('');
            }
          };

          const handleLogin = (e) => {
            e.preventDefault();
            if (username && password && isSuccess) {
              setLoggedIn(true);
            }
          };

          const devBypass = () => {
            const newState = { ...sysState, lockoutUntil: null };
            setSysState(newState);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(newState));
            setTimeLeft(null);
          };

          if (loggedIn) {
            return (
              <div className="min-h-screen bg-black flex items-center justify-center p-4 text-green-500 font-mono">
                <div className="border border-green-500/50 p-10 shadow-[0_0_30px_rgba(34,197,94,0.2)] text-center max-w-lg w-full bg-black/80">
                  <Terminal className="w-16 h-16 text-green-500 mx-auto mb-6" />
                  <h1 className="text-2xl font-bold mb-4 uppercase tracking-widest">Access Granted</h1>
                  <p className="text-sm text-green-400/70 mb-8">
                    User <span className="text-green-300 font-bold">{username}</span> authenticated. You survived the paranoia protocol.
                  </p>
                  <button 
                    onClick={() => {
                       setLoggedIn(false);
                       setIsSuccess(false);
                       setUsername('');
                       setPassword('');
                    }}
                    className="px-6 py-2 border border-green-500 hover:bg-green-500/10 transition-colors uppercase text-xs tracking-widest"
                  >
                    Disconnect Terminal
                  </button>
                </div>
              </div>
            );
          }

          const currentQuestion = PARANOIA_QUESTIONS[sysState.questionIndex % PARANOIA_QUESTIONS.length];
          const isLockedOut = !!sysState.lockoutUntil && timeLeft !== null;

          return (
            <div className="min-h-screen bg-black flex items-center justify-center p-4 font-mono text-zinc-300">
              <div className="max-w-md w-full bg-[#0a0a0a] shadow-[0_0_50px_rgba(0,0,0,1)] border border-zinc-800 relative">
                
                <div className="bg-[#050505] p-6 border-b border-zinc-800 flex flex-col items-center">
                  <EyeOff className="w-8 h-8 text-zinc-500 mb-3" />
                  <h2 className="text-lg font-bold text-zinc-300 tracking-[0.3em] uppercase">Sector 7g</h2>
                  <p className="text-[10px] text-zinc-600 mt-1 uppercase tracking-widest">Mad-Eye Paranoia Protocol v2.1</p>
                </div>

                <div className="p-6 md:p-8">
                  <form onSubmit={handleLogin} className="space-y-6">
                    
                    <div className="space-y-4">
                      <div>
                        <label className="block text-[10px] uppercase tracking-widest text-zinc-500 mb-1">User Designation</label>
                        <input 
                          type="text" 
                          value={username}
                          onChange={(e) => setUsername(e.target.value)}
                          disabled={isLockedOut}
                          className="w-full bg-black border border-zinc-800 py-3 px-4 text-zinc-200 focus:outline-none focus:border-zinc-500 disabled:opacity-30 transition-colors font-mono text-sm"
                          placeholder="Enter Designation"
                        />
                      </div>
                      <div>
                        <label className="block text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Security Key</label>
                        <input 
                          type="password" 
                          value={password}
                          onChange={(e) => setPassword(e.target.value)}
                          disabled={isLockedOut}
                          className="w-full bg-black border border-zinc-800 py-3 px-4 text-zinc-200 focus:outline-none focus:border-zinc-500 disabled:opacity-30 transition-colors font-mono text-sm"
                          placeholder="••••••••"
                        />
                      </div>
                    </div>

                    <div className="pt-6 border-t border-zinc-800/50">
                      
                      {isLockedOut ? (
                        <div className="bg-red-950/10 border border-red-900/50 p-6 text-center">
                          <Clock className="w-10 h-10 text-red-500/80 mx-auto mb-4 animate-pulse" />
                          <h3 className="text-sm font-bold text-red-500 uppercase tracking-widest mb-2">System Locked</h3>
                          <p className="text-xs text-red-400/60 mb-6 leading-relaxed">
                            Incorrect theory detected. Suspicion level increased. Penalty multiplied by {sysState.penaltyMultiplier - 1}.
                          </p>
                          
                          <div className="bg-black border border-red-900/30 p-4">
                            <p className="text-[10px] text-red-500/50 uppercase tracking-widest mb-1">Time Remaining</p>
                            <p className="text-2xl font-bold text-red-500 font-mono tracking-widest">{timeLeft}</p>
                          </div>
                        </div>
                      ) : isSuccess ? (
                        <div className="bg-green-950/10 border border-green-900/50 p-6 text-center shadow-[inset_0_0_20px_rgba(34,197,94,0.05)]">
                          <Unlock className="w-10 h-10 text-green-500 mx-auto mb-4" />
                          <h3 className="text-sm font-bold text-green-500 uppercase tracking-widest mb-2">Theory Validated</h3>
                          <p className="text-xs text-green-400/60 mb-6">
                            You have seen through the lies. Submit credentials to enter.
                          </p>
                          <button 
                            type="submit"
                            className="w-full py-3 px-4 bg-zinc-900 hover:bg-zinc-800 border border-green-500/50 text-green-500 text-xs font-bold uppercase tracking-widest transition-all flex items-center justify-center gap-2"
                          >
                            <KeyRound className="w-4 h-4" />
                            Enter System
                          </button>
                        </div>
                      ) : (
                        <div>
                          <div className="flex items-center justify-between mb-4">
                            <div className="flex items-center gap-2 text-zinc-500">
                              <ShieldAlert className="w-4 h-4" />
                              <h4 className="font-bold text-[10px] uppercase tracking-widest">Anti-Intruder Verification</h4>
                            </div>
                            <span className="text-[10px] uppercase tracking-widest text-red-500/70">
                              Attempts: 1
                            </span>
                          </div>
                          
                          <div className="bg-[#050505] border border-zinc-800/80 p-5 mb-4">
                            <p className="text-zinc-300 mb-6 text-sm leading-relaxed">
                              {currentQuestion.text}
                            </p>
                            
                            <div className="space-y-2">
                              {currentQuestion.options.map((option) => (
                                <label 
                                  key={option}
                                  className={`flex items-start gap-3 p-3 border cursor-pointer transition-all ${
                                    selectedAnswer === option 
                                      ? 'bg-zinc-900 border-zinc-500 text-zinc-200' 
                                      : 'bg-black border-zinc-800/50 text-zinc-500 hover:bg-zinc-900/50 hover:border-zinc-700'
                                  }`}
                                >
                                  <input 
                                    type="radio" 
                                    name="mad_eye_q" 
                                    value={option}
                                    checked={selectedAnswer === option}
                                    onChange={(e) => setSelectedAnswer(e.target.value)}
                                    className="mt-1 text-zinc-500 bg-black border-zinc-700"
                                  />
                                  <span className="text-xs leading-relaxed">{option}</span>
                                </label>
                              ))}
                            </div>
                          </div>

                          <button 
                            type="button"
                            onClick={handleVerify}
                            disabled={!selectedAnswer}
                            className="w-full py-3 bg-zinc-900 hover:bg-zinc-100 hover:text-black disabled:bg-black disabled:text-zinc-700 disabled:cursor-not-allowed disabled:border-zinc-800 border border-zinc-700 text-zinc-300 text-[10px] uppercase tracking-[0.2em] font-bold transition-all"
                          >
                            Submit 
                          </button>
                          <p className="text-[9px] uppercase tracking-widest text-center text-zinc-600 mt-4">
                            * Failure results in 24-hour compounding temporal lockdown.
                          </p>
                        </div>
                      )}

                    </div>
                  </form>
                </div>
                
                {isLockedOut && (
                  <button 
                    onClick={devBypass}
                    className="absolute bottom-0 right-0 w-8 h-8 opacity-0 hover:opacity-10 transition-opacity bg-white"
                    title="Dev Bypass"
                  />
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
